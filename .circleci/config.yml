version: 2.1

parameters:
  job:
    type: string
    default: "test"
  deploy_type:
    type: string
    default: ""
  options:
    type: string
    default: ""

jobs:
  test:
    docker:
      - image: swift:6.2.4-noble
    resource_class: large
    steps:
      - checkout
      - run: swift test
  deploy:
    docker:
      - image: docker:latest
    resource_class: large
    steps:
      - run: 
          name: Install Dependencies
          command: apk add --update --no-cache openssh-client make
      - run:
          name: Fix Host Authenticity
          command: 
            mkdir ~/.ssh && ssh-keyscan $SSH_HOST >> ~/.ssh/known_hosts
      - checkout
      - setup_remote_docker
      - run: 
          name: Build & Export & Scp & Deploy
          command: |
            make build-export-scp-deploy

workflows:
  version: 2

  test:
    when:
      equal: [ test, << pipeline.parameters.job >> ]
    jobs:
      - test

  deploy:
    when:
      equal: [ deploy, << pipeline.parameters.job >> ]
    jobs:
      - deploy